<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>


<body>
    <h1>Calculadora Flexbox</h1>
    <h2>Feita com: HTML CSS JS</h2>
    <div class="container">
        <div class="calculadora">
            <div class="visor">
                <input type="text" name="" id="visor">
                <button onclick="Sendnumber('C')">C</button>
            </div>

            <div class="teclado">
                <div class="btnSmall" onclick="Sendnumber('CE')">CE</div>
                <div class="btnSmall" onclick="Sendnumber('/')">/</div>
                <div class="btnSmall" onclick="Sendnumber('x')">x</div>
                <div class="btnSmall" onclick="Sendnumber('-')">-</div>
                <div class="btnSmall" onclick="Sendnumber('7')">7</div>
                <div class="btnSmall" onclick="Sendnumber('8')">8</div>
                <div class="btnSmall" onclick="Sendnumber('9')">9</div>

                <div class="btnBig" onclick="Sendnumber('+')">+</div>
                <div class="btnSmall" onclick="Sendnumber('4')">4</div>
                <div class="btnSmall" onclick="Sendnumber('5')">5</div>
                <div class="btnSmall" onclick="Sendnumber('6')">6</div>
                <div class="btnSmall" onclick="Sendnumber('1')">1</div>
                <div class="btnSmall" onclick="Sendnumber('2')">2</div>
                <div class="btnSmall" onclick="Sendnumber('3')">3</div>
                <div class="btnBig" onclick="Sendnumber('=')">=</div>
                <div class="btnBigrow" onclick="Sendnumber('0')">0</div>
                <div class="btnSmall" onclick="Sendnumber(',')">,</div>
            </div>
        </div>
    </div>

    <script src="JS/script.js">
    </script>
</body>

</html>
